name: build-sync-image

on:
  workflow_dispatch:
    inputs:
      logseq_ref:
        description: "Branch, tag, or commit SHA from SSamDav/logseq"
        required: false
        default: "fix/db-sync-multi-origin"
      image_tag:
        description: "Optional image tag override"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        shell: bash
        run: |
          ref="${{ github.event.inputs.logseq_ref || 'fix/db-sync-multi-origin' }}"
          tag="${{ github.event.inputs.image_tag }}"
          if [[ -z "$tag" ]]; then
            # Sanitize ref for use as a Docker tag (replace / and other
            # invalid characters with -, lowercase)
            safe_ref="${ref//[^a-zA-Z0-9._-]/-}"
            safe_ref="${safe_ref,,}"
            tag="$(date +%Y%m%d)-${safe_ref:0:20}"
          fi
          owner="${{ github.repository_owner }}"
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "logseq_ref=$ref" >> "$GITHUB_OUTPUT"
          echo "image_owner=${owner,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/sync/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.vars.outputs.image_owner }}/logseq-selfhost-sync:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.vars.outputs.image_owner }}/logseq-selfhost-sync:latest
          build-args: |
            LOGSEQ_REPO=SSamDav/logseq
            LOGSEQ_REF=${{ steps.vars.outputs.logseq_ref }}
          labels: |
            org.opencontainers.image.description=Self-hosted Logseq Sync Server (multi-origin fork)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
